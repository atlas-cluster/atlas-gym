services:
  postgres:
    image: postgres:18
    container_name: atlas-gym-postgres-dev
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
      - ./db/init/base/01_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./db/init/development/01_users.sql:/docker-entrypoint-initdb.d/02_users.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - atlas-network

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: atlas-gym-app-dev
    environment:
      - NODE_ENV=development
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
    ports:
      - '3000:3000'
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - atlas-network
    command: sh -c "bun install && bun run dev"

volumes:
  postgres_data_dev:

networks:
  atlas-network:
    driver: bridge
