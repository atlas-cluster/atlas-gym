services:
  postgres:
    image: postgres:18
    container_name: atlas-gym-postgres-prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - atlas-network
    restart: unless-stopped

  flyway:
    image: flyway/flyway:11
    container_name: atlas-gym-flyway-prod
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - ./db/migrations:/flyway/sql:ro
      - ./db/flyway.conf:/flyway/conf/flyway.conf:ro
    command: migrate
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - atlas-network

  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
      args:
        - BUILDKIT_INLINE_CACHE=1
    image: atlas-gym-app:${IMAGE_TAG:-latest}
    container_name: atlas-gym-app-${DEPLOYMENT_SLOT:-blue}
    environment:
      - NODE_ENV=production
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
    expose:
      - '3000'
    labels:
      - "com.atlas-gym.deployment.slot=${DEPLOYMENT_SLOT:-blue}"
      - "com.atlas-gym.deployment.version=${IMAGE_TAG:-latest}"
    healthcheck:
      test: ["CMD", "bun", "run", "/app/healthcheck.js"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      flyway:
        condition: service_completed_successfully
    networks:
      - atlas-network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: atlas-gym-nginx-prod
    ports:
      - '3000:80'
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - atlas-network
    restart: unless-stopped

volumes:
  postgres_data_prod:
    driver: local

networks:
  atlas-network:
    driver: bridge
