name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Ubuntu Server
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env file
        run: |
          cat > .env << EOF
          POSTGRES_USER=${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB=${{ secrets.POSTGRES_DB }}
          IMAGE_TAG=${{ github.sha }}
          EOF

      - name: Copy files to server
        uses: easingthemes/ssh-deploy@v5.1.0
        with:
          SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          REMOTE_HOST: ${{ secrets.DEPLOY_HOST }}
          REMOTE_USER: ${{ secrets.DEPLOY_USER }}
          REMOTE_PORT: ${{ secrets.DEPLOY_PORT || 22 }}
          SOURCE: .
          TARGET: /var/www/atlas-gym/
          EXCLUDE: node_modules/, .next/, .git/, *.log
          ARGS: -avzr

      - name: Blue-Green Deployment
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            cd /var/www/atlas-gym
            
            # Determine current active slot
            CURRENT_SLOT=$(docker ps --filter "name=atlas-gym-app" --format "{{.Names}}" | grep -oP '(blue|green)' || echo "green")
            NEW_SLOT=$([ "$CURRENT_SLOT" = "blue" ] && echo "green" || echo "blue")
            
            echo "Current slot: $CURRENT_SLOT"
            echo "Deploying to slot: $NEW_SLOT"
            
            # Export variables for docker-compose
            export IMAGE_TAG=${{ github.sha }}
            export DEPLOYMENT_SLOT=$NEW_SLOT
            
            # Build new image with caching
            docker compose -f docker-compose.prod.v2.yml build app
            
            # Start new slot (this will start alongside current slot)
            docker compose -f docker-compose.prod.v2.yml up -d app
            
            # Wait for health check to pass
            echo "Waiting for new deployment to be healthy..."
            MAX_WAIT=120
            COUNTER=0
            while [ $COUNTER -lt $MAX_WAIT ]; do
              if docker exec atlas-gym-app-$NEW_SLOT bun run /app/healthcheck.js 2>/dev/null; then
                echo "New deployment is healthy!"
                break
              fi
              echo "Waiting for health check... ($COUNTER/$MAX_WAIT)"
              sleep 2
              COUNTER=$((COUNTER + 2))
            done
            
            if [ $COUNTER -ge $MAX_WAIT ]; then
              echo "Deployment failed: health check timeout"
              docker compose -f docker-compose.prod.v2.yml logs app
              docker stop atlas-gym-app-$NEW_SLOT
              docker rm atlas-gym-app-$NEW_SLOT
              exit 1
            fi
            
            # Update nginx to route to new slot
            # For now, we'll rely on docker-compose service discovery
            # In production, you'd update nginx upstream here
            
            # Stop old slot
            if [ "$CURRENT_SLOT" != "$NEW_SLOT" ]; then
              echo "Stopping old slot: $CURRENT_SLOT"
              docker stop atlas-gym-app-$CURRENT_SLOT 2>/dev/null || true
              docker rm atlas-gym-app-$CURRENT_SLOT 2>/dev/null || true
            fi
            
            # Cleanup old images (keep last 3)
            docker images atlas-gym-app --format "{{.ID}}" | tail -n +4 | xargs -r docker rmi 2>/dev/null || true
            
            # Cleanup dangling images
            docker image prune -f
            
            echo "Deployment completed successfully to slot: $NEW_SLOT"
            echo "Active containers:"
            docker ps --filter "name=atlas-gym"
