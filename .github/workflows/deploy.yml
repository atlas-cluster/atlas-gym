name: CI/CD Pipeline

on:
  push:
    branches: ['main']

env:
  REGISTRY: ghcr.io
  APP_CONTAINER_NAME: atlas-gym-app
  DB_CONTAINER_NAME: atlas-gym-postgres

jobs:
  test:
    name: Run Tests
    uses: ./.github/workflows/test.yml

  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      db: ${{ steps.filter.outputs.db }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v2
        id: filter
        with:
          filters: |
            db:
              - 'Dockerfile.Postgres'

  build:
    name: Build Image
    runs-on: ubuntu-latest
    needs: [test, changes]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}
          tags: |
            type=raw,value=${{ github.sha }}
            type=raw,value=latest

      - name: Extract metadata (Postgres)
        id: meta-db
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}-db
          tags: |
            type=raw,value=${{ github.sha }}
            type=raw,value=latest

      - name: Build and Push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.App
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and Push Postgres image
        if: needs.changes.outputs.db == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.Postgres
          push: true
          tags: ${{ steps.meta-db.outputs.tags }}
          labels: ${{ steps.meta-db.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-db:
    name: Update Database Container
    needs: [build, changes]
    if: needs.changes.outputs.db == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Update Postgres via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          REGISTRY: ${{ env.REGISTRY }}
          DB_CONTAINER_NAME: ${{ env.DB_CONTAINER_NAME }}
          IMAGE_NAME: ${{ github.repository }}
          IMAGE_TAG: ${{ github.sha }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          REGISTRY_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.actor }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          proxy_host: ${{ secrets.JUMP_HOST }}
          proxy_username: ${{ secrets.JUMP_USER }}
          proxy_key: ${{ secrets.JUMP_SSH_KEY }}
          proxy_port: ${{ secrets.JUMP_PORT || 22 }}
          envs: REGISTRY,DB_CONTAINER_NAME,IMAGE_NAME,IMAGE_TAG,DB_USER,DB_PASSWORD,DB_NAME,REGISTRY_TOKEN,USERNAME
          script: |
            FULL_DB_IMAGE=$(echo "$REGISTRY/$IMAGE_NAME-db" | tr '[:upper:]' '[:lower:]')
            echo "$REGISTRY_TOKEN" | docker login $REGISTRY -u $USERNAME --password-stdin
            docker pull $FULL_DB_IMAGE:$IMAGE_TAG

            docker stop $DB_CONTAINER_NAME || true
            docker rm $DB_CONTAINER_NAME || true
            docker run -d \
              --name $DB_CONTAINER_NAME \
              --restart unless-stopped \
              --network host \
              -v atlas-gym_postgres_data_prod:/var/lib/postgresql \
              -e POSTGRES_USER="$DB_USER" \
              -e POSTGRES_PASSWORD="$DB_PASSWORD" \
              -e POSTGRES_DB="$DB_NAME" \
              $FULL_DB_IMAGE:$IMAGE_TAG \
              postgres -c shared_preload_libraries=pg_cron -c cron.database_name="$DB_NAME"
            docker image prune -a -f

  migrate:
    name: Run Database Migrations
    needs: deploy-db
    if: ${{ !failure() && !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy migration files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          proxy_host: ${{ secrets.JUMP_HOST }}
          proxy_username: ${{ secrets.JUMP_USER }}
          proxy_key: ${{ secrets.JUMP_SSH_KEY }}
          proxy_port: ${{ secrets.JUMP_PORT || 22 }}
          source: 'db'
          target: 'deploy/atlas-gym'

      - name: Run Flyway
        uses: appleboy/ssh-action@v1.0.3
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          proxy_host: ${{ secrets.JUMP_HOST }}
          proxy_username: ${{ secrets.JUMP_USER }}
          proxy_key: ${{ secrets.JUMP_SSH_KEY }}
          proxy_port: ${{ secrets.JUMP_PORT || 22 }}
          envs: DB_HOST,DB_NAME,DB_USER,DB_PASSWORD
          script: |
            docker pull flyway/flyway:latest
            docker run --rm \
              --network host \
              -v $HOME/deploy/atlas-gym/db/migrations:/flyway/sql/migrations \
              -v $HOME/deploy/atlas-gym/db/seeds:/flyway/sql/seeds \
              flyway/flyway:latest \
              -url=jdbc:postgresql://$DB_HOST:5432/$DB_NAME \
              -user=$DB_USER \
              -password=$DB_PASSWORD \
              -schemas=flyway \
              -locations=filesystem:/flyway/sql/migrations,filesystem:/flyway/sql/seeds \
              migrate

  deploy-app:
    name: Deploy Application
    needs: migrate
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH (through Jump Host)
        uses: appleboy/ssh-action@v1.0.3
        env:
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_NAME: ${{ github.repository }}
          APP_CONTAINER_NAME: ${{ env.APP_CONTAINER_NAME }}
          IMAGE_TAG: ${{ github.sha }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          REGISTRY_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.actor }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          proxy_host: ${{ secrets.JUMP_HOST }}
          proxy_username: ${{ secrets.JUMP_USER }}
          proxy_key: ${{ secrets.JUMP_SSH_KEY }}
          proxy_port: ${{ secrets.JUMP_PORT || 22 }}
          envs: REGISTRY,IMAGE_NAME,APP_CONTAINER_NAME,IMAGE_TAG,DB_HOST,DB_NAME,DB_USER,DB_PASSWORD,REGISTRY_TOKEN,USERNAME
          script: |
            FULL_APP_IMAGE=$(echo "$REGISTRY/$IMAGE_NAME" | tr '[:upper:]' '[:lower:]')
            echo "$REGISTRY_TOKEN" | docker login $REGISTRY -u $USERNAME --password-stdin
            docker pull $FULL_APP_IMAGE:$IMAGE_TAG

            docker stop $APP_CONTAINER_NAME || true
            docker rm $APP_CONTAINER_NAME || true
            docker run -d \
              --name $APP_CONTAINER_NAME \
              --restart unless-stopped \
              --network host \
              -e DB_HOST="$DB_HOST" \
              -e DB_USER="$DB_USER" \
              -e DB_PASSWORD="$DB_PASSWORD" \
              -e DB_NAME="$DB_NAME" \
              -e NODE_ENV=production \
              $FULL_APP_IMAGE:$IMAGE_TAG
            docker image prune -a -f
