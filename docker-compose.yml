services:
  postgres:
    image: postgres:18
    container_name: atlas-gym-postgres-dev
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data_dev:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - atlas-network

  flyway:
    image: flyway/flyway:11
    container_name: atlas-gym-flyway-dev
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - ./db/migrations:/flyway/sql:ro
      - ./db/flyway.conf:/flyway/conf/flyway.conf:ro
    command: migrate
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - atlas-network

volumes:
  postgres_data_dev:

networks:
  atlas-network:
    driver: bridge
