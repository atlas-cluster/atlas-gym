services:
  postgres:
    build:
      context: .
      dockerfile: Dockerfile.Postgres
    container_name: atlas-gym-postgres-dev
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    command:
      - 'postgres'
      - '-c'
      - 'shared_preload_libraries=pg_cron'
      - '-c'
      - 'cron.database_name=${DB_NAME}'
    ports:
      - '5432:5432'
    volumes:
      - postgres_data_dev:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER} -d ${DB_NAME}']
      interval: 5s
      timeout: 5s
      retries: 5

  flyway:
    image: flyway/flyway:11
    container_name: atlas-gym-flyway-dev
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    volumes:
      - ./db/migrations:/flyway/sql/migrations:ro
      - ./db/seeds:/flyway/sql/seeds:ro
      - ./db/flyway.conf:/flyway/conf/flyway.conf:ro
    command: migrate
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data_dev:
